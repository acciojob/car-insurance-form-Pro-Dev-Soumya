<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
		<form method="post">

			<label for="name">Name</label>
			<input id="name" type="text" required>
		<br>
			<label for="email">Email</label>
			<input id="email" type="email" required>
			<br>
			<label>Gender</label>
			<br>
			<label for="male">Male</label>
			<input id="male" type="radio" name="gender" required>
			<label for="female">Female</label>
			<input id="female" type="radio" name="gender" required>
			<br>
			<label for="cars">Car Brands</label>
			  <select id="cars" name="cars">
    <option>--Select--</option>
    <option>BMW</option>
    <option>Audi</option>
    <option>Mercedes</option>
  </select>

			<br>
			<label for="carage">Car Age</label>
			<input id="carage" type="number" required>

			<br>
			<label for="dop">Date of Purchase</label>
			<input id="dop" type="number" required>

			<br>
			<label for="password">Password</label>
			<input id="password" type="password" required>
			<br>
		<button type="submit">Submit Button</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
